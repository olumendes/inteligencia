name = "inteligencia-licitatoria-api"
type = "javascript"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Default variables
vars = { PING_MESSAGE = "ping pong" }

# Production environment
[env.production]
name = "inteligencia-licitatoria-api-prod"
routes = [
  { pattern = "api.inteligencia-licitatoria.com/*", zone_name = "inteligencia-licitatoria.com" }
]

# Secrets (set via: wrangler secret put RESEND_API_KEY --env production)
# wrangler secret put RESEND_API_KEY
# wrangler secret put GMAIL_USER
# wrangler secret put GMAIL_APP_PASSWORD
