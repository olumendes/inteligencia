name = "inteligencia-licitatoria-api"
type = "javascript"
main = "src/index.ts"
compatibility_date = "2024-01-01"

env = { production = {} }

[env.production]

# Variables (use these for non-sensitive config)
vars = { PING_MESSAGE = "ping pong" }

# Secrets (sensitive values - set these via `wrangler secret put`)
# wrangler secret put RESEND_API_KEY
# wrangler secret put GMAIL_USER
# wrangler secret put GMAIL_APP_PASSWORD
